<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta | Chat.ICON</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

:root{
    --bg:#f8fbff;
    --card:#fff;
    --text:#222;
    --primary:#2196f3;
    --border:#e5edf5;
}

.dark{
    --bg:#0d1117;
    --card:#161b22;
    --text:#f5f5f5;
    --border:#2d333b;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:30px;
}

.logo{
    text-align:center;
    font-size:2rem;
    margin-bottom:20px;
}

.logo strong{ color:var(--primary); }

.form-group{ margin-top:15px; }

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
    outline:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.criar{
    background:var(--primary);
    color:#fff;
}

.erro{
    margin-top:10px;
    color:#ff3b30;
    text-align:center;
    display:none;
}

.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    background:var(--primary);
    color:#fff;
    padding:10px 18px;
    border-radius:10px;
    transition:.3s;
}

.toast.show{
    transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">Chat.<strong>ICON</strong></div>

    <div class="form-group">
        <label>Nome</label>
        <input id="nome" type="text">
    </div>

    <div class="form-group">
        <label>Usuário</label>
        <input id="usuario" type="text">
    </div>

    <div class="form-group">
        <label>Senha</label>
        <input id="senha" type="password">
    </div>

    <button class="criar" id="criar">Criar Conta</button>

    <div class="erro" id="erro"></div>

</div>

<div class="toast" id="toast">Conta criada</div>

<script>

/* ==========================
   TEMA
========================== */

if(localStorage.getItem("tema") === "dark"){
    document.body.classList.add("dark");
}

/* ==========================
   ELEMENTOS
========================== */

const nome = document.getElementById("nome");
const usuario = document.getElementById("usuario");
const senha = document.getElementById("senha");
const erro = document.getElementById("erro");
const toast = document.getElementById("toast");

/* ==========================
   BANCO LOCAL (USUÁRIOS)
========================== */

function pegarUsuarios(){
    return JSON.parse(localStorage.getItem("usuarios")) || [];
}

function salvarUsuarios(lista){
    localStorage.setItem("usuarios", JSON.stringify(lista));
}

/* ==========================
   CADASTRO LOCAL
========================== */

document.getElementById("criar").addEventListener("click", () => {

    const n = nome.value.trim();
    const u = usuario.value.trim();
    const s = senha.value;

    erro.style.display = "none";

    if(!n || !u || !s){
        erro.textContent = "Preencha todos os campos.";
        erro.style.display = "block";
        return;
    }

    const usuarios = pegarUsuarios();

    const existe = usuarios.find(item => item.usuario === u);

    if(existe){
        erro.textContent = "Esse usuário já existe.";
        erro.style.display = "block";
        return;
    }

    usuarios.push({
        nome: n,
        usuario: u,
        senha: s
    });

    salvarUsuarios(usuarios);

    toast.classList.add("show");

    setTimeout(() => {
        location.href = "login.html";
    }, 900);

});

</script>

</body>
</html>
