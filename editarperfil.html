<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Perfil | Chat.ICON</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

:root{
    --bg:#f8fbff;
    --card:#ffffff;
    --primary:#2196f3;
    --text:#222;
    --border:#e5edf5;
}

.dark{
    --bg:#0d1117;
    --card:#161b22;
    --text:#f5f5f5;
    --border:#2d333b;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid var(--border);
}

.logo strong{color:var(--primary);}

.theme{
    width:40px;height:40px;border:none;border-radius:50%;
    cursor:pointer;background:var(--card);color:var(--text);
}

.container{max-width:600px;margin:auto;padding:30px 20px;}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:25px;
}

.avatar-area{text-align:center;margin-bottom:25px;}

.avatar{
    width:120px;height:120px;margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:4px solid var(--primary);
}

.avatar img{width:100%;height:100%;object-fit:cover;}

.change-photo{
    display:inline-block;
    margin-top:12px;
    color:var(--primary);
    cursor:pointer;
}

input,textarea{
    width:100%;
    padding:14px;
    border:1px solid var(--border);
    border-radius:14px;
    background:transparent;
    color:var(--text);
    outline:none;
    margin-top:10px;
}

textarea{min-height:120px;resize:none;}

.actions{display:flex;gap:10px;margin-top:25px;}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
}

.save{background:var(--primary);color:white;}
.cancel{background:transparent;border:1px solid var(--border);color:var(--text);}

.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    background:var(--primary);
    color:white;
    padding:12px 20px;
    border-radius:12px;
    transition:.3s;
}

.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<body>

<header>
    <div class="logo">Chat.<strong>ICON</strong></div>
    <button class="theme" id="themeBtn">🌙</button>
</header>

<div class="container">
<div class="card">

    <div class="avatar-area">
        <div class="avatar">
            <img id="preview" src="https://picsum.photos/300">
        </div>

        <label class="change-photo">
            Alterar foto
            <input type="file" id="foto" hidden accept="image/*">
        </label>
    </div>

    <input id="nome" placeholder="Nome">
    <input id="usuario" placeholder="@usuario">

    <textarea id="bio" maxlength="150" placeholder="Bio..."></textarea>

    <div class="actions">
        <button class="save" id="salvar">Salvar</button>
        <button class="cancel" onclick="location.href='perfil.html'">Cancelar</button>
    </div>

</div>
</div>

<div class="toast" id="toast">Perfil atualizado!</div>

<script>

/* ==========================
   PROTEÇÃO
========================== */

const usuarioLogado =
JSON.parse(localStorage.getItem("usuarioLogado"));

if(!usuarioLogado){
    location.replace("login.html");
}

/* ==========================
   TEMA
========================== */

const themeBtn =
document.getElementById("themeBtn");

if(localStorage.getItem("tema") === "dark"){
    document.body.classList.add("dark");
}

themeBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark");

    localStorage.setItem(
        "tema",
        document.body.classList.contains("dark")
        ? "dark"
        : "light"
    );

});

/* ==========================
   ELEMENTOS
========================== */

const nome =
document.getElementById("nome");

const usuario =
document.getElementById("usuario");

const bio =
document.getElementById("bio");

const foto =
document.getElementById("foto");

const preview =
document.getElementById("preview");

const toast =
document.getElementById("toast");

/* ==========================
   CARREGAR PERFIL
========================== */

const perfil =
JSON.parse(
    localStorage.getItem(
        "perfil_" + usuarioLogado.usuario
    )
);

if(perfil){

    nome.value =
    perfil.nome || "";

    usuario.value =
    perfil.usuario || "";

    bio.value =
    perfil.bio || "";

    if(perfil.foto){
        preview.src =
        perfil.foto;
    }

}else{

    nome.value =
    usuarioLogado.nome || "";

    usuario.value =
    usuarioLogado.usuario || "";

}

/* ==========================
   FOTO
========================== */

foto.addEventListener("change", e => {

    const file = e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = ev => {
        preview.src =
        ev.target.result;
    };

    reader.readAsDataURL(file);

});

/* ==========================
   SALVAR PERFIL
========================== */

document.getElementById("salvar")
.addEventListener("click", () => {

    const perfilAtualizado = {

        nome:
        nome.value.trim(),

        usuario:
        usuario.value.trim(),

        bio:
        bio.value.trim(),

        foto:
        preview.src

    };

    if(
        !perfilAtualizado.nome ||
        !perfilAtualizado.usuario
    ){
        alert("Preencha nome e usuário.");
        return;
    }

    localStorage.setItem(
        "perfil_" +
        perfilAtualizado.usuario,

        JSON.stringify(
            perfilAtualizado
        )
    );

    localStorage.setItem(
        "usuarioLogado",

        JSON.stringify({
            nome:
            perfilAtualizado.nome,

            usuario:
            perfilAtualizado.usuario
        })
    );

    toast.classList.add("show");

    setTimeout(() => {

        location.href =
        "perfil.html";

    }, 800);

});

/* ==========================
   CTRL + S
========================== */

document.addEventListener(
    "keydown",
    e => {

        if(
            e.ctrlKey &&
            e.key === "s"
        ){

            e.preventDefault();

            document
            .getElementById("salvar")
            .click();

        }

    }
);

</script>

</body>
</html>
